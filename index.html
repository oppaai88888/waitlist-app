<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TraceFlow — Supply chain transparency for seafood importers</title>
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f1a1a;
    color: #f2f5f4;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .hero {
    max-width: 480px;
    width: 100%;
    text-align: center;
    background: #F8F8F6;
  }

  h1 {
    font-size: 3rem;
    margin: 0 0 12px;
    letter-spacing: -0.02em;
  }

  .tagline {
    font-size: 1.15rem;
    color: #a7b8b6;
    margin: 0 0 40px;
  }

  form {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  input[type="email"] {
    flex: 1 1 260px;
    padding: 14px 16px;
    font-size: 1rem;
    border-radius: 8px;
    border: 1px solid #2b3a38;
    background: #182524;
    color: #f2f5f4;
    outline: none;
  }

  input[type="email"]:focus {
    border-color: #4fd1c5;
  }

  button {
    padding: 14px 24px;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    border: none;
    background: #4fd1c5;
    color: #0f1a1a;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }

  button:hover {
    opacity: 0.9;
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .message {
    margin-top: 20px;
    font-size: 0.95rem;
    min-height: 1.2em;
  }

  .message.success {
    color: #4fd1c5;
  }

  .message.error {
    color: #f28b82;
  }
</style>
</head>
<body>
  <div class="hero">
    <h1>TraceFlow</h1>
    <p class="tagline">Supply chain transparency for seafood importers</p>

    <form id="waitlist-form">
      <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email">
      <button type="submit" id="submit-btn">Join Waitlist</button>
    </form>

    <p class="message" id="message"></p>
  </div>

  <script>
    const form = document.getElementById('waitlist-form');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submit-btn');
    const messageEl = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      messageEl.textContent = '';
      messageEl.className = 'message';
      submitBtn.disabled = true;

      try {
        const res = await fetch('/waitlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          messageEl.textContent = 'You are on the list';
          messageEl.className = 'message success';
          emailInput.value = '';
        } else if (res.status === 409) {
          messageEl.textContent = data.error || 'This email is already registered';
          messageEl.className = 'message error';
        } else {
          messageEl.textContent = data.error || 'Something went wrong. Please try again.';
          messageEl.className = 'message error';
        }
      } catch (err) {
        messageEl.textContent = 'Something went wrong. Please try again.';
        messageEl.className = 'message error';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
